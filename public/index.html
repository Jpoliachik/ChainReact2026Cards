<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chain React Cards</title>
<style>
  :root {
    --bg: #14131a;
    --panel: #1d1b26;
    --panel-2: #252330;
    --ink: #ece9f5;
    --muted: #8d88a3;
    --faint: #5d5872;
    --line: #2f2c3d;
    --gold: #d9b35e;
    --locked: #6ee0a8;
    --candidate: #8da7e0;
    --cut: #5d5872;
    --ai: #c98bdb; --native: #6ee0a8; --motion: #f0a878;
    --craft: #d9b35e; --process: #8da7e0; --conference: #e87b9a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 22px 120px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 {
    font: 600 26px/1 "Iowan Old Style", Georgia, serif; letter-spacing: .2px; margin: 0;
  }
  .sub { color: var(--muted); font-size: 13px; }
  .save { margin-left: auto; font-size: 12px; color: var(--faint); transition: color .2s; }
  .save.dirty { color: var(--gold); }
  .save.ok { color: var(--locked); }

  /* coverage bar */
  .coverage { display: flex; gap: 2px; margin: 18px 0 6px; height: 8px; border-radius: 6px; overflow: hidden; }
  .coverage div { transition: flex-grow .3s; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  /* controls */
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  input[type="search"], select {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 11px; font-size: 13px; outline: none;
  }
  input[type="search"] { min-width: 220px; }
  input[type="search"]:focus, select:focus { border-color: var(--gold); }
  .btn {
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer;
  }
  .btn:hover { border-color: var(--gold); }
  .btn.primary { background: var(--gold); color: #1a160a; border-color: var(--gold); font-weight: 600; }
  .counts { margin-left: auto; font-size: 13px; color: var(--muted); }
  .counts b { color: var(--ink); }

  /* card rows */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 13px 14px; display: grid; grid-template-columns: 30px 1fr; gap: 12px;
    align-items: start; transition: border-color .15s, opacity .15s, transform .05s;
  }
  .card.cut { opacity: .42; }
  .card.fav { border-color: var(--gold); }
  .card.dragging { opacity: .4; }
  .card.dragover { border-color: var(--gold); transform: translateY(1px); }
  .rank {
    display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 2px;
    color: var(--faint); cursor: grab; user-select: none;
  }
  .rank .num { font: 600 14px/1 ui-monospace, monospace; color: var(--muted); }
  .rank .grip { font-size: 14px; line-height: 1; }
  .body { min-width: 0; }
  .top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .name {
    font: 600 18px/1.2 "Iowan Old Style", Georgia, serif; cursor: text;
  }
  .name[contenteditable]:focus, .profile[contenteditable]:focus, .notes:focus {
    outline: none; background: var(--panel-2); border-radius: 6px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .domain-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
    letter-spacing: .5px; font-weight: 600; cursor: pointer; border: 1px solid transparent;
  }
  .profile { color: var(--muted); font-size: 14px; margin: 5px 0 9px; cursor: text; }
  .meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .stars { display: inline-flex; gap: 2px; }
  .star { cursor: pointer; color: var(--faint); font-size: 16px; line-height: 1; }
  .star.on { color: var(--gold); }
  .fav-btn { cursor: pointer; color: var(--faint); font-size: 16px; }
  .fav-btn.on { color: var(--gold); }
  .status-pills { display: inline-flex; gap: 4px; }
  .pill {
    font-size: 11px; padding: 3px 9px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line); color: var(--muted); background: transparent;
  }
  .pill.locked.on { background: var(--locked); color: #08231a; border-color: var(--locked); }
  .pill.candidate.on { background: var(--candidate); color: #0a1430; border-color: var(--candidate); }
  .pill.cut.on { background: var(--cut); color: #fff; border-color: var(--cut); }
  .notes {
    width: 100%; margin-top: 9px; background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; color: var(--ink); font-size: 13px;
    font-family: inherit; resize: vertical; min-height: 0; height: 34px;
  }
  .notes::placeholder { color: var(--faint); }
  .del { margin-left: auto; cursor: pointer; color: var(--faint); font-size: 13px; }
  .del:hover { color: var(--conference); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chain React Cards</h1>
    <span class="sub" id="eventsub"></span>
    <span class="save" id="save">saved</span>
  </header>

  <div class="coverage" id="coverage"></div>
  <div class="legend" id="legend"></div>

  <div class="controls">
    <input type="search" id="q" placeholder="search name / profile / notes…" />
    <select id="filterDomain"><option value="">all domains</option></select>
    <select id="filterStatus">
      <option value="">all statuses</option>
      <option value="locked">locked</option>
      <option value="candidate">candidate</option>
      <option value="cut">cut</option>
    </select>
    <select id="sort">
      <option value="rank">sort: stack rank</option>
      <option value="rating">sort: rating</option>
      <option value="favorite">sort: favorites</option>
      <option value="domain">sort: domain</option>
    </select>
    <button class="btn primary" id="add">+ card</button>
    <span class="counts" id="counts"></span>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const DOMAINS = ["ai","native","motion","craft","process","conference"];
let DATA = { meta:{}, cards:[] };
let saveTimer = null;

const $ = (s, el=document) => el.querySelector(s);
const save = $("#save");

async function load() {
  const r = await fetch("/api/cards");
  DATA = await r.json();
  $("#eventsub").textContent = DATA.meta.event + "  ·  target " + (DATA.meta.target||30);
  buildLegend();
  buildDomainFilter();
  render();
}

function markDirty() {
  save.textContent = "unsaved…"; save.className = "save dirty";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 700);
}
async function persist() {
  save.textContent = "saving…";
  await fetch("/api/cards", { method:"PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(DATA) });
  save.textContent = "saved ✓"; save.className = "save ok";
  setTimeout(() => { if (save.className==="save ok") { save.textContent="saved"; save.className="save"; } }, 1500);
}

function domainColor(d){ return getComputedStyle(document.documentElement).getPropertyValue("--"+d).trim(); }

function buildLegend(){
  const counts = countDomains();
  $("#legend").innerHTML = DOMAINS.map(d =>
    `<span><i class="dot" style="background:${domainColor(d)}"></i>${d} <b style="color:var(--ink)">${counts[d]||0}</b></span>`
  ).join("");
}
function buildDomainFilter(){
  const sel = $("#filterDomain");
  DOMAINS.forEach(d => { const o=document.createElement("option"); o.value=d; o.textContent=d; sel.appendChild(o); });
}
function countDomains(){
  const c = {};
  DATA.cards.filter(x=>x.status!=="cut").forEach(x => c[x.domain]=(c[x.domain]||0)+1);
  return c;
}
function renderCoverage(){
  const c = countDomains();
  $("#coverage").innerHTML = DOMAINS.map(d =>
    `<div style="flex-grow:${c[d]||0.001};background:${domainColor(d)}" title="${d}: ${c[d]||0}"></div>`
  ).join("");
}

function render() {
  renderCoverage();
  buildLegend();
  const q = $("#q").value.toLowerCase();
  const fd = $("#filterDomain").value;
  const fs = $("#filterStatus").value;
  const sort = $("#sort").value;

  let cards = DATA.cards.map((c,i)=>({c,i}));
  cards = cards.filter(({c}) =>
    (!fd || c.domain===fd) && (!fs || c.status===fs) &&
    (!q || (c.name+c.profile+(c.notes||"")).toLowerCase().includes(q)));

  if (sort==="rating") cards.sort((a,b)=>(b.c.rating||0)-(a.c.rating||0));
  else if (sort==="favorite") cards.sort((a,b)=>(b.c.favorite?1:0)-(a.c.favorite?1:0));
  else if (sort==="domain") cards.sort((a,b)=>DOMAINS.indexOf(a.c.domain)-DOMAINS.indexOf(b.c.domain));

  const list = $("#list");
  list.innerHTML = "";
  cards.forEach(({c,i}) => list.appendChild(row(c,i)));

  const locked = DATA.cards.filter(c=>c.status==="locked").length;
  const cand = DATA.cards.filter(c=>c.status==="candidate").length;
  $("#counts").innerHTML = `<b>${locked}</b> locked · <b>${cand}</b> candidates · <b>${DATA.cards.length}</b> total`;
}

function row(c, idx) {
  const el = document.createElement("div");
  el.className = "card " + c.status + (c.favorite ? " fav":"");
  el.dataset.idx = idx;
  el.draggable = false;

  const dcol = domainColor(c.domain);
  el.innerHTML = `
    <div class="rank" draggable="true">
      <span class="num">${idx+1}</span><span class="grip">⠿</span>
    </div>
    <div class="body">
      <div class="top">
        <span class="name" contenteditable="plaintext-only">${esc(c.name)}</span>
        <span class="domain-tag" style="background:${dcol}22;color:${dcol};border-color:${dcol}55">${c.domain}</span>
        <span class="del">delete</span>
      </div>
      <div class="profile" contenteditable="plaintext-only">${esc(c.profile)}</div>
      <div class="meta">
        <span class="fav-btn ${c.favorite?"on":""}" title="favorite">★</span>
        <span class="stars"></span>
        <span class="status-pills">
          <span class="pill locked ${c.status==="locked"?"on":""}">locked</span>
          <span class="pill candidate ${c.status==="candidate"?"on":""}">candidate</span>
          <span class="pill cut ${c.status==="cut"?"on":""}">cut</span>
        </span>
      </div>
      <textarea class="notes" placeholder="why it works / doesn't, move ideas, tweaks…">${esc(c.notes||"")}</textarea>
    </div>`;

  // stars
  const stars = $(".stars", el);
  for (let s=1;s<=5;s++){
    const st = document.createElement("span");
    st.className = "star" + ((c.rating||0)>=s ? " on":"");
    st.textContent = "●";
    st.onclick = () => { c.rating = (c.rating===s ? 0 : s); markDirty(); render(); };
    stars.appendChild(st);
  }

  $(".fav-btn", el).onclick = () => { c.favorite=!c.favorite; markDirty(); render(); };
  $(".del", el).onclick = () => { if(confirm("Delete "+c.name+"?")){ DATA.cards.splice(idx,1); markDirty(); render(); } };
  $(".name", el).onblur = e => { c.name=e.target.textContent.trim(); markDirty(); };
  $(".profile", el).onblur = e => { c.profile=e.target.textContent.trim(); markDirty(); };
  $(".notes", el).onblur = e => { c.notes=e.target.value; markDirty(); };

  // domain cycle
  $(".domain-tag", el).onclick = () => {
    const n = DOMAINS[(DOMAINS.indexOf(c.domain)+1)%DOMAINS.length];
    c.domain=n; markDirty(); render();
  };

  el.querySelectorAll(".pill").forEach(p => {
    p.onclick = () => {
      c.status = p.classList.contains("locked")?"locked":p.classList.contains("candidate")?"candidate":"cut";
      markDirty(); render();
    };
  });

  // drag to reorder (only via grip handle)
  const grip = $(".rank", el);
  grip.addEventListener("dragstart", e => {
    e.dataTransfer.setData("text/plain", idx); el.classList.add("dragging");
  });
  grip.addEventListener("dragend", () => el.classList.remove("dragging"));
  el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("dragover"); });
  el.addEventListener("dragleave", () => el.classList.remove("dragover"));
  el.addEventListener("drop", e => {
    e.preventDefault(); el.classList.remove("dragover");
    const from = +e.dataTransfer.getData("text/plain");
    const to = idx;
    if (from===to || isNaN(from)) return;
    const [moved] = DATA.cards.splice(from,1);
    DATA.cards.splice(to,0,moved);
    markDirty(); render();
  });

  return el;
}

function esc(s){ return (s||"").replace(/[&<>]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }

function addCard(){
  const id = "new-card-" + DATA.cards.length;
  DATA.cards.unshift({ id, name:"The …", profile:"", domain:"ai", status:"candidate",
    rating:null, favorite:false, notes:"" });
  markDirty(); render();
  $(".name")?.focus();
}

["#q","#filterDomain","#filterStatus","#sort"].forEach(s => $(s).addEventListener("input", render));
$("#add").onclick = addCard;
window.addEventListener("beforeunload", e => { if(save.className.includes("dirty")){ persist(); } });
load();
</script>
</body>
</html>
