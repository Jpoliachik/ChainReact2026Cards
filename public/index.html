<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chain React Cards</title>
<style>
  :root {
    --bg: #14131a;
    --panel: #1d1b26;
    --panel-2: #252330;
    --ink: #ece9f5;
    --muted: #9b96b0;
    --faint: #5d5872;
    --line: #2f2c3d;
    --gold: #d9b35e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 120px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { font: 600 28px/1 "Iowan Old Style", Georgia, serif; letter-spacing: .2px; margin: 0; }
  .sub { color: var(--muted); font-size: 13px; }
  .count { margin-left: auto; font-size: 13px; color: var(--muted); }
  .count b { color: var(--ink); }
  .artdir {
    margin-top: 16px; padding: 12px 14px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; font-size: 12.5px; color: var(--muted);
  }
  .artdir b { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }

  .grid {
    display: grid; gap: 20px; margin-top: 24px;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }

  .art {
    aspect-ratio: 5 / 4; position: relative; display: flex;
    align-items: center; justify-content: center; border-bottom: 1px solid var(--line);
    background:
      radial-gradient(120% 90% at 50% 0%, #d9b35e1f, transparent 70%),
      repeating-linear-gradient(45deg, #00000000 0 14px, #ffffff06 14px 15px);
  }
  .art img { width: 100%; height: 100%; object-fit: cover; }
  .art .placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .art .glyph { font-size: 32px; color: var(--gold); opacity: .85; }
  .art .pending { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
  .art .frame { position: absolute; inset: 10px; border: 1px solid #d9b35e44; border-radius: 10px; }

  .meta { padding: 16px 18px 16px; display: flex; flex-direction: column; gap: 12px; }
  .name { font: 600 22px/1.2 "Iowan Old Style", Georgia, serif; }
  .saying {
    font-size: 15px; font-style: italic; color: var(--gold);
    padding-left: 11px; border-left: 2px solid #d9b35e66;
  }

  .moves { display: flex; flex-direction: column; gap: 9px; }
  .move {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 11px;
  }
  .move .mname { font-weight: 700; font-size: 13.5px; }
  .move .mname::before { content: "⟡ "; color: var(--gold); }
  .move .mdesc { color: var(--muted); font-size: 13px; margin-top: 2px; }

  details.internal { margin-top: 2px; border-top: 1px dashed var(--line); padding-top: 10px; }
  details.internal summary {
    cursor: pointer; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--faint); list-style: none; user-select: none;
  }
  details.internal summary::-webkit-details-marker { display: none; }
  details.internal summary::before { content: "▸ "; }
  details.internal[open] summary::before { content: "▾ "; }
  .int-block { margin-top: 9px; }
  .int-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .int-desc { font-size: 13px; color: var(--muted); font-style: italic; }
  .prompt-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; }
  .int-prompt {
    flex: 1; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink); background: #00000033; border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px;
  }
  .copy {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    border-radius: 7px; padding: 6px 9px; font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .copy:hover { border-color: var(--gold); color: var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chain React Cards</h1>
    <span class="sub" id="sub"></span>
    <span class="count" id="count"></span>
  </header>
  <div class="artdir" id="artdir"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const esc = s => (s||"").replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
let ART_DIR = "";

function fullPrompt(c) {
  return ART_DIR ? `${ART_DIR}\n\nCharacter — ${c.name}: ${c.imagePrompt}` : c.imagePrompt;
}

function cardEl(c) {
  const el = document.createElement("div");
  el.className = "card";
  const art = c.image
    ? `<div class="art"><img src="${esc(c.image)}" alt="${esc(c.name)}"/></div>`
    : `<div class="art">
         <div class="placeholder"><span class="glyph">✦</span><span class="pending">art pending</span></div>
         <div class="frame"></div>
       </div>`;
  const moves = (c.moves || []).map(m => `
    <div class="move">
      <div class="mname">${esc(m.name)}</div>
      <div class="mdesc">${esc(m.description)}</div>
    </div>`).join("");
  el.innerHTML = `
    ${art}
    <div class="meta">
      <div class="name">${esc(c.name)}</div>
      <div class="saying">“${esc(c.saying)}”</div>
      <div class="moves">${moves}</div>
      <details class="internal">
        <summary>internal — character & prompt</summary>
        <div class="int-block">
          <div class="int-label">Character</div>
          <div class="int-desc">${esc(c.description)}</div>
        </div>
        <div class="int-block">
          <div class="int-label">Image prompt</div>
          <div class="prompt-row">
            <div class="int-prompt">${esc(c.imagePrompt)}</div>
            <button class="copy">copy full</button>
          </div>
        </div>
      </details>
    </div>`;
  el.querySelector(".copy").onclick = e => {
    navigator.clipboard.writeText(fullPrompt(c));
    e.target.textContent = "copied ✓";
    setTimeout(() => (e.target.textContent = "copy full"), 1200);
  };
  return el;
}

(async () => {
  const data = await (await fetch("/api/cards")).json();
  ART_DIR = data.meta.artDirection || "";
  document.getElementById("sub").textContent = data.meta.event;
  document.getElementById("count").innerHTML =
    `<b>${data.cards.length}</b> cards · target <b>${data.meta.target || 30}</b>`;
  document.getElementById("artdir").innerHTML =
    `<b>Shared art direction</b><br>${esc(ART_DIR)}`;
  const grid = document.getElementById("grid");
  data.cards.forEach(c => grid.appendChild(cardEl(c)));
})();
</script>
</body>
</html>
