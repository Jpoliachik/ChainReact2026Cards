<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chain React Cards</title>
<!-- Shared renderer; the card stylesheet (card.css) is loaded per-card inside
     a shadow root so its Tailwind reset never touches this gallery's theme. -->
<script src="/render/card.js"></script>
<style>
  :root {
    --bg: #14131a; --panel: #1d1b26; --panel-2: #252330; --ink: #ece9f5;
    --muted: #9b96b0; --faint: #5d5872; --line: #2f2c3d; --gold: #d9b35e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px 120px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { font: 600 28px/1 "Iowan Old Style", Georgia, serif; letter-spacing: .2px; margin: 0; }
  .sub { color: var(--muted); font-size: 13px; }
  .count { font-size: 13px; color: var(--muted); }
  .count b { color: var(--ink); }
  header .spacer { margin-left: auto; }

  .btn { background: var(--panel-2); border: 1px solid var(--gold); color: var(--gold);
    border-radius: 9px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; }
  .btn:hover:not(:disabled) { background: var(--gold); color: var(--bg); }
  .btn:disabled { opacity: .5; cursor: default; }
  .artdir { margin-top: 16px; padding: 12px 14px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 10px; font-size: 12.5px; color: var(--muted); }
  .artdir b { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }

  .grid { display: grid; gap: 26px; margin-top: 28px;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); justify-items: center; }
  .cell { width: 340px; display: flex; flex-direction: column; gap: 10px; }

  /* The live card preview hosts a shadow root (see mountCard). */
  .preview { width: 340px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.4); background: #000; }

  .controls { display: flex; align-items: center; gap: 8px; }
  .controls .name { font: 600 15px/1.2 "Iowan Old Style", Georgia, serif; flex: 1; }
  .gen { background: var(--panel-2); border: 1px solid var(--gold); color: var(--gold);
    border-radius: 7px; padding: 5px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .gen:hover:not(:disabled) { background: var(--gold); color: var(--bg); }
  .gen:disabled { opacity: .6; cursor: default; }

  details.internal { border-top: 1px dashed var(--line); padding-top: 9px; }
  details.internal summary { cursor: pointer; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--faint); list-style: none; user-select: none; }
  details.internal summary::-webkit-details-marker { display: none; }
  details.internal summary::before { content: "▸ "; }
  details.internal[open] summary::before { content: "▾ "; }
  .int-block { margin-top: 9px; }
  .int-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .int-desc { font-size: 13px; color: var(--muted); font-style: italic; }
  .prompt-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; }
  .int-prompt { flex: 1; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink); background: #00000033; border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; }
  .copy { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    border-radius: 7px; padding: 6px 9px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .copy:hover { border-color: var(--gold); color: var(--ink); }

  /* A/B compare shown when a regeneration is pending a keep/discard decision. */
  .ab { display: flex; gap: 8px; }
  .ab-col { position: relative; margin: 0; flex: 1; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--line); background: #000; }
  .ab-col img { width: 100%; display: block; aspect-ratio: 5 / 4; object-fit: cover; }
  .ab-col figcaption { position: absolute; bottom: 0; left: 0; right: 0; text-align: center;
    font-size: 11px; padding: 3px; background: #000000aa; color: var(--muted); }
  .ab-col.is-new { border-color: var(--gold); }
  .ab-col.is-new figcaption { color: var(--gold); }
  .revert { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chain React Cards</h1>
    <span class="sub" id="sub"></span>
    <span class="spacer"></span>
    <span class="count" id="count"></span>
    <button class="btn" id="genAll">✦ Generate missing art</button>
  </header>
  <div class="artdir" id="artdir"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const esc = s => (s||"").replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
const CARD_W = 816, CARD_H = 1110, PREVIEW_W = 340;
const SCALE = PREVIEW_W / CARD_W;
let ART_DIR = "";
let CARDS = [];
let PENDING = {}; // id -> candidate art path awaiting a keep/discard decision
let PREV = {};    // id -> true when a one-deep undo (.prev) slot exists

function fullPrompt(c) {
  return ART_DIR ? `${ART_DIR}\n\nCharacter — ${c.name}: ${c.imagePrompt}` : c.imagePrompt;
}

// Tailwind v4 declares the default values for its internal custom properties
// (e.g. --tw-border-style: solid) with @property rules. Those only register at
// the document level — when card.css is loaded *only* inside per-card shadow
// roots, the registrations never happen, so var(--tw-border-style) is empty and
// every border collapses to `none` (and gradients lose their stops). Re-register
// the @property rules once in the light DOM; registered custom properties are
// document-global, so the shadow-DOM cards then resolve them correctly. This is
// invisible to the gallery's own theme — @property only declares properties, it
// applies no styles to any element.
async function registerCardProps() {
  try {
    const css = await (await fetch("card.css")).text();
    const props = css.match(/@property[^{]+\{[^}]*\}/g);
    if (!props) return;
    const style = document.createElement("style");
    style.textContent = props.join("\n");
    document.head.appendChild(style);
  } catch (e) {
    console.warn("Couldn't register card @property defaults:", e);
  }
}

// Render the real 816×1110 card into a shadow root, scaled to the preview
// width. card.css is loaded inside the shadow so its global reset is contained.
function mountCard(host, card) {
  const root = host.shadowRoot || host.attachShadow({ mode: "open" });
  root.innerHTML = `
    <link rel="stylesheet" href="card.css" />
    <style>
      :host { display: block; width: ${PREVIEW_W}px; height: ${Math.round(CARD_H * SCALE)}px; }
      .scaler { width: ${CARD_W}px; height: ${CARD_H}px; transform: scale(${SCALE}); transform-origin: top left; }
    </style>
    <div class="scaler">${createCard(card)}</div>`;
}

// Generate (or regenerate) art for one card via the server's Gemini endpoint.
async function generate(c, btn) {
  const label = btn && btn.textContent;
  if (btn) { btn.disabled = true; btn.textContent = "generating…"; }
  try {
    const r = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: c.id }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || r.statusText);
    if (j.pending) {
      // Regeneration: a candidate is waiting beside the current art for A/B.
      PENDING[c.id] = j.candidate;
    } else {
      c.image = j.image + "?t=" + Date.now(); // first-time art; cache-bust it
    }
    renderAll();
    return true;
  } catch (e) {
    alert(`Couldn't generate "${c.name}":\n\n${e.message}`);
    if (btn) { btn.disabled = false; btn.textContent = label; }
    return false;
  }
}

// Resolve a pending candidate (keep / discard) or undo a prior keep (revert).
async function resolveArt(c, action) {
  try {
    const r = await fetch("/api/art/" + action, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: c.id }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || r.statusText);
    delete PENDING[c.id];
    if (action === "keep") { c.image = j.image + "?t=" + Date.now(); PREV[c.id] = true; }
    if (action === "revert") { c.image = j.image + "?t=" + Date.now(); delete PREV[c.id]; }
    renderAll();
  } catch (e) {
    alert(`Couldn't ${action} "${c.name}":\n\n${e.message}`);
  }
}

// The internal character/prompt expander, shared by both cell modes.
function internalEl(c) {
  return `
    <details class="internal">
      <summary>internal — character & prompt</summary>
      <div class="int-block">
        <div class="int-label">Character</div>
        <div class="int-desc">${esc(c.description)}</div>
      </div>
      <div class="int-block">
        <div class="int-label">Image prompt</div>
        <div class="prompt-row">
          <div class="int-prompt">${esc(c.imagePrompt)}</div>
          <button class="copy">copy full</button>
        </div>
      </div>
    </details>`;
}

function wireCopy(cell, c) {
  cell.querySelector(".copy.copyfull").onclick = e => {
    navigator.clipboard.writeText(fullPrompt(c));
    e.target.textContent = "copied ✓";
    setTimeout(() => (e.target.textContent = "copy full"), 1200);
  };
}

// A/B compare mode: a regeneration is waiting beside the current art.
function pendingCellEl(c) {
  const cell = document.createElement("div");
  cell.className = "cell";
  const cur = c.image || "";
  const neu = PENDING[c.id] + (PENDING[c.id].includes("?") ? "" : "?t=" + Date.now());
  cell.innerHTML = `
    <div class="ab">
      <figure class="ab-col"><img src="${esc(cur)}" alt="" /><figcaption>current</figcaption></figure>
      <figure class="ab-col is-new"><img src="${esc(neu)}" alt="" /><figcaption>new ✦</figcaption></figure>
    </div>
    <div class="controls">
      <span class="name">${esc(c.name)}</span>
      <button class="copy again" title="discard this candidate and generate another">↻ again</button>
      <button class="copy discard">keep current</button>
      <button class="gen keep">✓ use new</button>
    </div>
    ${internalEl(c).replace('class="copy"', 'class="copy copyfull"')}`;
  cell.querySelector(".keep").onclick = () => resolveArt(c, "keep");
  cell.querySelector(".discard").onclick = () => resolveArt(c, "discard");
  cell.querySelector(".again").onclick = e => generate(c, e.target);
  wireCopy(cell, c);
  return cell;
}

function cellEl(c) {
  if (PENDING[c.id]) return pendingCellEl(c);
  const cell = document.createElement("div");
  cell.className = "cell";
  const genLabel = c.image ? "↻ regenerate art" : "✦ generate art";
  const revertBtn = PREV[c.id]
    ? `<button class="copy revert" title="restore the previous art">↶ revert</button>` : "";
  cell.innerHTML = `
    <div class="preview"></div>
    <div class="controls">
      <span class="name">${esc(c.name)}</span>
      ${revertBtn}
      <button class="gen">${genLabel}</button>
    </div>
    ${internalEl(c).replace('class="copy"', 'class="copy copyfull"')}`;
  mountCard(cell.querySelector(".preview"), c);
  cell.querySelector(".gen").onclick = e => generate(c, e.target);
  if (revertBtn) cell.querySelector(".revert").onclick = () => resolveArt(c, "revert");
  wireCopy(cell, c);
  return cell;
}

function renderAll() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  CARDS.forEach(c => grid.appendChild(cellEl(c)));
}

document.getElementById("genAll").onclick = async (e) => {
  const btn = e.target;
  const missing = CARDS.filter(c => !c.image);
  if (!missing.length) { alert("Every card already has art. Use a card's ↻ button to redo one."); return; }
  btn.disabled = true;
  const orig = btn.textContent;
  let done = 0;
  for (const c of missing) {
    btn.textContent = `generating ${++done}/${missing.length}…`;
    const ok = await generate(c, null);
    if (!ok) break; // stop the batch on first failure (likely a missing/invalid key)
  }
  btn.disabled = false;
  btn.textContent = orig;
};

(async () => {
  await registerCardProps(); // must run before cards mount so borders resolve
  const data = await (await fetch("/api/cards")).json();
  ART_DIR = data.meta.artDirection || "";
  CARDS = data.cards;
  // Restore any pending candidates / undo slots left over from a prior session.
  try {
    const state = await (await fetch("/api/art/state")).json();
    for (const [id, s] of Object.entries(state)) {
      if (s.candidate) PENDING[id] = s.candidate;
      if (s.prev) PREV[id] = true;
    }
  } catch {}
  document.getElementById("sub").textContent = data.meta.event;
  const withArt = data.cards.filter(c => c.image).length;
  document.getElementById("count").innerHTML =
    `<b>${data.cards.length}</b> cards · <b>${withArt}</b> with art`;
  document.getElementById("artdir").innerHTML =
    `<b>Shared art direction</b><br>${esc(ART_DIR)}`;
  renderAll();
})();
</script>
</body>
</html>
