<!DOCTYPE html>
<html lang="en">
<!--
  Static, view-only showcase served by GitHub Pages.
  Fetches ./cards.json for the card list and shows the finished cards from
  ./card-exports/<id>.png (committed by `pnpm export`). Falls back to an
  "art pending" tile for any card without an export yet.
  (The interactive gallery with live rendering + art generation lives in
  public/index.html and needs the Node server: `pnpm start`.)
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chain React Cards</title>
<meta property="og:title" content="Chain React Cards" />
<meta property="og:description" content="Developer-archetype cards for Chain React 2026 — which one are you?" />
<style>
  :root {
    --bg: #14131a; --panel: #1d1b26; --ink: #ece9f5;
    --muted: #9b96b0; --faint: #5d5872; --line: #2f2c3d; --gold: #d9b35e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px 120px; }
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { font: 600 28px/1 "Iowan Old Style", Georgia, serif; letter-spacing: .2px; margin: 0; }
  .sub { color: var(--muted); font-size: 13px; }
  .count { margin-left: auto; font-size: 13px; color: var(--muted); }
  .count b { color: var(--ink); }
  .grid { display: grid; gap: 26px; margin-top: 28px; justify-items: center;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  .card { width: 340px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.4); background: #000; }
  .card img { display: block; width: 100%; height: auto; }
  .card.placeholder { aspect-ratio: 816 / 1110; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    border: 1px solid var(--line); background: var(--panel); }
  .glyph { font-size: 32px; color: var(--gold); opacity: .85; }
  .pending { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chain React Cards</h1>
    <span class="sub" id="sub"></span>
    <span class="count" id="count"></span>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script>
const esc = s => (s||"").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

function cardEl(c) {
  const el = document.createElement("div");
  // The finished card is rendered to card-exports/<id>.png by `pnpm export`.
  if (c.image) {
    el.className = "card";
    el.innerHTML = `<img loading="lazy" src="card-exports/${esc(c.id)}.png" alt="${esc(c.name)}" />`;
  } else {
    el.className = "card placeholder";
    el.innerHTML = `<span class="glyph">✦</span><span class="pending">${esc(c.name)} — art pending</span>`;
  }
  return el;
}

(async () => {
  const data = await (await fetch("./cards.json")).json();
  document.getElementById("sub").textContent = data.meta?.event || "";
  document.getElementById("count").innerHTML = `<b>${data.cards.length}</b> cards`;
  const grid = document.getElementById("grid");
  data.cards.forEach(c => grid.appendChild(cardEl(c)));
})();
</script>
</body>
</html>
